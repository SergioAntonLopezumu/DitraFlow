# Base de datos H2 para tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.tfg.ditraflow=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# JWT
jwt.secret=test-secret-key-for-testing-only-not-for-production
jwt.expiration=86400000

# AI Service (Ollama para tests)
ai.service.provider=ollama
ai.service.ollama.url=http://localhost:11434
ai.service.ollama.model=mistral

# Security
spring.security.user.name=admin
spring.security.user.password=admin123
